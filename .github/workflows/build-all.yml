name: Build all tools (Windows + macOS)

on:
  workflow_dispatch:
    inputs:
      tools:
        description: 'Tool da buildare (csv, "all" per tutti)'
        required: true
        default: 'all'
      bypass_license:
        description: 'Build con VITE_BYPASS_LICENSE=1 (testing)'
        type: boolean
        default: true
  push:
    tags:
      - 'release-v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: macos-14,        target: aarch64-apple-darwin,   label: macos-arm64 }
          - { os: macos-14,        target: x86_64-apple-darwin,    label: macos-intel }
          - { os: windows-latest,  target: x86_64-pc-windows-msvc, label: windows-x64 }

    runs-on: ${{ matrix.platform.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.platform.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            apps/*/src-tauri/target
            crates/*/target
          key: ${{ matrix.platform.os }}-tauri-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore JWT public key
        shell: bash
        run: |
          if [ -n "${{ secrets.LICENSING_JWT_PUBLIC_KEY }}" ]; then
            echo "${{ secrets.LICENSING_JWT_PUBLIC_KEY }}" > crates/license-verify/public-key.pem
          else
            echo "Usando la public key dal repo (modalità dev/bypass)"
          fi

      # Le env APPLE_*/TAURI_SIGNING_* NON vanno qui se non sono effettivamente
      # configurate nei secrets: una stringa vuota fa scattare comunque il codesign
      # in Tauri, che poi fallisce su `security import`. Per build firmate vere,
      # configura i secret e usa il workflow release-signed.yml separato.
      - name: Build all tools
        shell: bash
        env:
          VITE_BYPASS_LICENSE: ${{ inputs.bypass_license && '1' || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # NB: NON usiamo `set -e` perché il loop deve continuare anche se
          # una singola app fallisce, in modo da raccogliere gli installer
          # delle altre 9 negli artifacts.

          INPUT_TOOLS="${{ inputs.tools }}"
          if [ -z "$INPUT_TOOLS" ] || [ "$INPUT_TOOLS" = "all" ] || [ "${{ github.event_name }}" = "push" ]; then
            TOOLS="estrattore-fatture validatore-anagrafiche pulitore-anagrafiche generatore-documenti pdf-toolkit-pro scadenziario-fiscale riconciliazione-bancaria excel-auditor catalogo-generator ai-aziendale-locale"
          else
            TOOLS=$(echo "$INPUT_TOOLS" | tr ',' ' ')
          fi

          TARGET="${{ matrix.platform.target }}"
          FAILED=""

          for app in $TOOLS; do
            echo ""
            echo "════════════════════════════════════════════════════════════════"
            echo "  Building: $app  (target: $TARGET)"
            echo "════════════════════════════════════════════════════════════════"
            if pnpm --filter "@mini-tools/$app" exec tauri build --target "$TARGET"; then
              echo "✓ $app built"
            else
              echo "✗ $app FAILED"
              FAILED="$FAILED $app"
            fi
          done

          if [ -n "$FAILED" ]; then
            echo ""
            echo "FALLITI:$FAILED"
            exit 1
          fi

      - name: Collect installers
        if: always()
        shell: bash
        run: |
          mkdir -p bundles
          echo "=== Struttura target/ ==="
          ls -la target/ 2>/dev/null || echo "(target/ non esiste)"
          echo ""
          echo "=== Cartelle bundle trovate ==="
          find target -type d -name bundle 2>/dev/null || echo "(nessuna)"
          echo ""
          echo "=== Cerco installer ==="
          # I bundle Tauri con --target finiscono in target/<TARGET>/release/bundle/
          # Su Windows: bundle/msi/*.msi e bundle/nsis/*.exe
          # Su macOS:   bundle/dmg/*.dmg e bundle/macos/*.app.tar.gz
          find target -type f -path '*/release/bundle/*' \
            \( -name '*.msi' -o -name '*.dmg' -o -name '*.exe' -o -name '*.app.tar.gz' \) \
            -print -exec cp {} bundles/ \; 2>/dev/null || true
          echo ""
          echo "=== bundles/ finale ==="
          ls -lah bundles/ || echo "(nessun file raccolto)"
          echo ""
          echo "Totale file:"
          find bundles -type f | wc -l

      - name: Upload test fixtures (solo da Windows per evitare duplicati)
        if: always() && matrix.platform.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: test-fixtures
          path: test-fixtures/
          retention-days: 14

      - name: Upload installers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform.label }}
          path: bundles/
          if-no-files-found: warn
          retention-days: 14
