name: Build all tools (Windows + macOS)

# Triggera manualmente da GitHub UI → Actions → Run workflow,
# oppure ad ogni push di un tag del tipo "release-vX.Y.Z".
on:
  workflow_dispatch:
    inputs:
      tools:
        description: 'Tool da buildare (csv, "all" per tutti)'
        required: true
        default: 'all'
      bypass_license:
        description: 'Build con VITE_BYPASS_LICENSE=1 (solo testing)'
        type: boolean
        default: true
  push:
    tags:
      - 'release-v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: macos-14,        target: aarch64-apple-darwin,  label: macos-arm64 }
          - { os: macos-14,        target: x86_64-apple-darwin,   label: macos-intel }
          - { os: windows-latest,  target: x86_64-pc-windows-msvc, label: windows-x64 }

    runs-on: ${{ matrix.platform.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.platform.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            apps/*/src-tauri/target
            crates/*/target
          key: ${{ matrix.platform.os }}-tauri-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux deps (skip)
        if: false
        run: echo "Linux non incluso nella matrice"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore JWT public key
        shell: bash
        run: |
          if [ -n "${{ secrets.LICENSING_JWT_PUBLIC_KEY }}" ]; then
            echo "${{ secrets.LICENSING_JWT_PUBLIC_KEY }}" > crates/license-verify/public-key.pem
          else
            echo "WARN: secret LICENSING_JWT_PUBLIC_KEY non configurata, uso quella nel repo (sviluppo)."
          fi

      - name: Set bypass license env
        if: ${{ inputs.bypass_license == true }}
        shell: bash
        run: echo "VITE_BYPASS_LICENSE=1" >> $GITHUB_ENV

      - name: Build Estrattore Fatture
        if: contains(inputs.tools, 'estrattore-fatture') || inputs.tools == 'all' || github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_BYPASS_LICENSE: ${{ env.VITE_BYPASS_LICENSE }}
        with:
          projectPath: apps/estrattore-fatture
          args: --target ${{ matrix.platform.target }}

      - name: Build Validatore Anagrafiche
        if: contains(inputs.tools, 'validatore-anagrafiche') || inputs.tools == 'all' || github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_BYPASS_LICENSE: ${{ env.VITE_BYPASS_LICENSE }}
        with:
          projectPath: apps/validatore-anagrafiche
          args: --target ${{ matrix.platform.target }}

      - name: Build Pulitore Anagrafiche
        if: contains(inputs.tools, 'pulitore-anagrafiche') || inputs.tools == 'all' || github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_BYPASS_LICENSE: ${{ env.VITE_BYPASS_LICENSE }}
        with:
          projectPath: apps/pulitore-anagrafiche
          args: --target ${{ matrix.platform.target }}

      - name: Build Generatore Documenti
        if: contains(inputs.tools, 'generatore-documenti') || inputs.tools == 'all' || github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_BYPASS_LICENSE: ${{ env.VITE_BYPASS_LICENSE }}
        with:
          projectPath: apps/generatore-documenti
          args: --target ${{ matrix.platform.target }}

      - name: Build PDF Toolkit Pro
        if: contains(inputs.tools, 'pdf-toolkit-pro') || inputs.tools == 'all' || github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_BYPASS_LICENSE: ${{ env.VITE_BYPASS_LICENSE }}
        with:
          projectPath: apps/pdf-toolkit-pro
          args: --target ${{ matrix.platform.target }}

      - name: Build Scadenziario Fiscale
        if: contains(inputs.tools, 'scadenziario-fiscale') || inputs.tools == 'all' || github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_BYPASS_LICENSE: ${{ env.VITE_BYPASS_LICENSE }}
        with:
          projectPath: apps/scadenziario-fiscale
          args: --target ${{ matrix.platform.target }}

      - name: Build Riconciliazione Bancaria
        if: contains(inputs.tools, 'riconciliazione-bancaria') || inputs.tools == 'all' || github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_BYPASS_LICENSE: ${{ env.VITE_BYPASS_LICENSE }}
        with:
          projectPath: apps/riconciliazione-bancaria
          args: --target ${{ matrix.platform.target }}

      - name: Build Excel Auditor
        if: contains(inputs.tools, 'excel-auditor') || inputs.tools == 'all' || github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_BYPASS_LICENSE: ${{ env.VITE_BYPASS_LICENSE }}
        with:
          projectPath: apps/excel-auditor
          args: --target ${{ matrix.platform.target }}

      - name: Build Catalogo Generator
        if: contains(inputs.tools, 'catalogo-generator') || inputs.tools == 'all' || github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_BYPASS_LICENSE: ${{ env.VITE_BYPASS_LICENSE }}
        with:
          projectPath: apps/catalogo-generator
          args: --target ${{ matrix.platform.target }}

      - name: Build AI Aziendale Locale
        if: contains(inputs.tools, 'ai-aziendale-locale') || inputs.tools == 'all' || github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_BYPASS_LICENSE: ${{ env.VITE_BYPASS_LICENSE }}
        with:
          projectPath: apps/ai-aziendale-locale
          args: --target ${{ matrix.platform.target }}

      - name: Collect bundles
        if: always()
        shell: bash
        run: |
          mkdir -p bundles
          # macOS bundles
          find apps/*/src-tauri/target -path '*/release/bundle/dmg/*.dmg' -exec cp {} bundles/ \; 2>/dev/null || true
          find apps/*/src-tauri/target -path '*/release/bundle/macos/*.app.tar.gz' -exec cp {} bundles/ \; 2>/dev/null || true
          # Windows bundles
          find apps/*/src-tauri/target -path '*/release/bundle/msi/*.msi' -exec cp {} bundles/ \; 2>/dev/null || true
          find apps/*/src-tauri/target -path '*/release/bundle/nsis/*.exe' -exec cp {} bundles/ \; 2>/dev/null || true
          ls -la bundles/

      - name: Upload installers as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform.label }}
          path: bundles/
          retention-days: 14
